<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios Disponibles de los Docentes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Horarios Disponibles de los Docentes</h1>
    </header>

    <section id="horarios">
        <h2>Calendario de Disponibilidad</h2>
        <div class="calendar">
            <div class="day">Lunes</div>
            <div class="day">Martes</div>
            <div class="day">Miércoles</div>
            <div class="day">Jueves</div>
            <div class="day">Viernes</div>
            <div class="day">Sábado</div>
            <div class="day">Domingo</div>

            <div class="available" onclick="showAvailableSlots('Docente 1', 'Lunes')">1</div>
            <div class="unavailable" onclick="alert('No disponible')">2</div>
            <div class="available" onclick="showAvailableSlots('Docente 2', 'Martes')">3</div>
            <div class="available" onclick="showAvailableSlots('Docente 3', 'Miércoles')">4</div>
            <!-- Más días -->
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Incuba Andina Lab - UAC</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
