<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Horarios</title>
    <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/core@3.2.0/main.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@3.2.0/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid@3.2.0/main.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        #calendar {
            max-width: 900px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Calendario de Horarios de Docentes</h1>
    </header>

    <div id="calendar"></div>

    <footer>
        <p>&copy; 2025 Incuba Andina Lab - UAC</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: [
                    {
                        title: 'Reunión con Docente 1',
                        start: '2025-04-05T09:00:00',
                        end: '2025-04-05T11:00:00'
                    },
                    {
                        title: 'Reunión con Docente 2',
                        start: '2025-04-06T14:00:00',
                        end: '2025-04-06T16:00:00'
                    }
                ]
            });

            calendar.render();
        });
    </script>
</body>
</html>
